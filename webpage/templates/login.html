{% extends 'base.html' %}

{% block title %}Coconut Voting Room — Login{% endblock %}

{% block content %}
    <h1>⬡ Coconut Voting Room ⬡</h1>
    <div class="box">
        <h3>Enter Secure Game Space</h3>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required autocomplete="off"><br>
            <input type="password" name="secret" placeholder="Secret Keyword" required><br><br>
            <button type="submit" class="btn">Verify identity</button>
        </form>
    </div>
{% endblock %}
